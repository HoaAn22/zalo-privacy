<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: "Segoe UI", Roboto, Arial, sans-serif; width: 240px; padding: 16px; margin: 0; color: #333; }
        .header { font-size: 15px; font-weight: 600; text-align: center; color: #0068ff; border-bottom: 1px solid #eaeaea; padding-bottom: 10px; margin-bottom: 16px;}
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .setting-row:last-child { margin-bottom: 0; }
        .label { font-size: 14px; font-weight: 500; }
        
        /* CSS cho Toggle Switch (Công tắc) */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #0068ff; }
        input:checked + .slider:before { transform: translateX(18px); }
    </style>
</head>
<body>
    <div class="header">Tùy chỉnh</div>
    
    <!-- CẬP NHẬT: Đã thêm id="masterLabel" -->
    <div class="setting-row" style="border-bottom: 1px dashed #ccc; padding-bottom: 14px; margin-bottom: 14px;">
        <span class="label" id="masterLabel" style="font-weight: 700;">Khóa nhanh</span>
        <label class="switch">
            <input type="checkbox" id="masterToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="setting-row">
        <span class="label">Làm mờ - Tin nhắn</span>
        <label class="switch">
            <input type="checkbox" id="blurMessage">
            <span class="slider"></span>
        </label>
    </div>

    <div class="setting-row">
        <span class="label">Làm mờ - Ảnh đại diện</span>
        <label class="switch">
            <input type="checkbox" id="blurAvatar">
            <span class="slider"></span>
        </label>
    </div>

    <div class="setting-row">
        <span class="label">Làm mờ - Tên người dùng</span>
        <label class="switch">
            <input type="checkbox" id="blurName">
            <span class="slider"></span>
        </label>
    </div>

    <script src="popup.js"></script>
</body>
</html>
